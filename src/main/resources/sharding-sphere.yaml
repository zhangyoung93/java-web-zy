dataSources:
  #定义公共数据源配置模板
  .common-dataSource-config: &common-dataSource-config
    #==========dataSource==========
    dataSourceClassName: com.alibaba.druid.pool.DruidDataSource
    driverClassName: com.mysql.jdbc.Driver
    username: root
    password: root
    #==========Druid Config==========
    # 初始化连接数（默认0，建议5-10）
    initial-size: 5
    # 最小空闲连接数（低于该值自动创建）
    min-idle: 5
    # 最大活跃连接数（控制并发上限）
    max-active: 20
    # 获取连接的最大等待时间（毫秒，超时抛异常）
    max-wait: 60000
    # 检测空闲连接的时间间隔（毫秒）
    time-between-eviction-runs-millis: 60000
    # 连接最小生存时间（毫秒）
    min-evictable-idle-time-millis: 300000
    # 验证连接有效性的 SQL（MySQL 专用）
    validation-query: SELECT 1
    # 空闲时检测连接有效性（必须开启，避免失效连接）
    test-while-idle: true
    # 申请连接时不检测（提升性能）
    test-on-borrow: false
    # 归还连接时不检测（提升性能）
    test-on-return: false
    # 开启 PS Cache（提升 SQL 执行性能）
    pool-prepared-statements: true
    # PS Cache 最大缓存数
    max-pool-prepared-statement-per-connection-size: 20
    # 启用过滤器：stat（监控）、wall（防SQL注入）、slf4j（日志）
    filters: stat,wall,slf4j
  #分库数据源
  ds1:
    <<: *common-dataSource-config
    jdbcUrl: jdbc:mysql://localhost:3306/ds1?characterEncoding=utf8&useOldAliasMetadataBehavior=true&autoReconnect=true&useSSL=false&serverTimezone=UTC
  ds2:
    <<: *common-dataSource-config
    jdbcUrl: jdbc:mysql://localhost:3306/ds2?characterEncoding=utf8&useOldAliasMetadataBehavior=true&autoReconnect=true&useSSL=false&serverTimezone=UTC

#规则
rules:
  #分片规则
  - !SHARDING
    tables:
      #逻辑表名
      sys_log:
        #实际数据节点
        actualDataNodes: ds${1..2}.sys_log_2026${['01','02','03','04','05','06','07','08','09','10','11','12']}
        #分库策略
        databaseStrategy:
          standard:
            #分片字段名
            shardingColumn: app_service_id
            #分片算法
            shardingAlgorithmName: database-alg
        #分表策略
        tableStrategy:
          standard:
            shardingColumn: log_time
            shardingAlgorithmName: table-alg
    shardingAlgorithms:
      #分库算法
      database-alg:
        #行表达式算法
        type: INLINE
        props:
          #取模算法
          algorithm-expression: ds${(app_service_id % 2) + 1}
      #分表算法
      table-alg:
        #自定义算法
        type: CLASS_BASED
        props:
          #策略
          strategy: standard
          #自定义算法类的全限定名
          algorithm-class-name: com.zy.demo.handler.DateShardingAlgorithm
          #表名年月后缀
          date-pattern: yyyyMM
#是否打印SQL
props:
  sql-show: true